          GIFT_CARD_ORDER_WEBHOOK_URL=${GIFT_CARD_ORDER_WEBHOOK_URL}
          GIFT_CARD_ORDER_WEBHOOK_SECRET=${GIFT_CARD_ORDER_WEBHOOK_SECRET}
          GIFT_CARD_EMAIL_ENABLED=${GIFT_CARD_EMAIL_ENABLED}
          GIFT_CARD_EMAIL_PROVIDER=${GIFT_CARD_EMAIL_PROVIDER:-auto}
          GIFT_CARD_EMAIL_FROM=${GIFT_CARD_EMAIL_FROM}
          GIFT_CARD_EMAIL_FROM_NAME=${GIFT_CARD_EMAIL_FROM_NAME}
          GIFT_CARD_EMAIL_REPLY_TO=${GIFT_CARD_EMAIL_REPLY_TO}
          GIFT_CARD_FULFILLMENT_EMAIL=${GIFT_CARD_FULFILLMENT_EMAIL}
          RESEND_API_KEY=${RESEND_API_KEY}
