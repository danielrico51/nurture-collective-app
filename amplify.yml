          GOOGLE_SERVICE_ACCOUNT_EMAIL=${GOOGLE_SERVICE_ACCOUNT_EMAIL}
          GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY=${GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY}
          GOOGLE_SERVICE_ACCOUNT_JSON=${GOOGLE_SERVICE_ACCOUNT_JSON}
          GOOGLE_CALENDAR_ENABLED=${GOOGLE_CALENDAR_ENABLED:-true}
          GOOGLE_CALENDAR_AUTH_MODE=${GOOGLE_CALENDAR_AUTH_MODE:-delegated}
          GOOGLE_WORKLOAD_IDENTITY_PROJECT_NUMBER=${GOOGLE_WORKLOAD_IDENTITY_PROJECT_NUMBER}
          GOOGLE_WORKLOAD_IDENTITY_POOL_ID=${GOOGLE_WORKLOAD_IDENTITY_POOL_ID}
          GOOGLE_WORKLOAD_IDENTITY_PROVIDER_ID=${GOOGLE_WORKLOAD_IDENTITY_PROVIDER_ID}
          GOOGLE_WORKLOAD_IDENTITY_SERVICE_ACCOUNT=${GOOGLE_WORKLOAD_IDENTITY_SERVICE_ACCOUNT:-${GOOGLE_TASKS_IMPERSONATE_SERVICE_ACCOUNT}}
          GOOGLE_CALENDAR_ID=${GOOGLE_CALENDAR_ID:-c_2d5a066a46512e1ec02b55c8c92e83e00a9a8e77655de2e712a347fbb969552c@group.calendar.google.com}
          CLASS_EVENTS_GOOGLE_CALENDAR_ID=${CLASS_EVENTS_GOOGLE_CALENDAR_ID:-c_6c4c40e2772622371ffcd13d9f51dd52474ad5f05740f10faf1d4468a272f415@group.calendar.google.com}
          CLASS_EVENTS_CALENDAR_SYNC_ENABLED=${CLASS_EVENTS_CALENDAR_SYNC_ENABLED:-true}
          GOOGLE_CALENDAR_DELEGATED_USER=${GOOGLE_CALENDAR_DELEGATED_USER:-admin@nesting-place.com}
