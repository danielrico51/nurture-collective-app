version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20
        - nvm use 20
        - node -v
        - npm cache clean --force
        - npm install --legacy-peer-deps --no-audit
    build:
      commands:
        - |
          cat > .env.production <<EOF
          NEXT_PUBLIC_AWS_REGION=${NEXT_PUBLIC_AWS_REGION:-us-east-1}
          NEXT_PUBLIC_USER_POOL_ID=${NEXT_PUBLIC_USER_POOL_ID}
          NEXT_PUBLIC_USER_POOL_CLIENT_ID=${NEXT_PUBLIC_USER_POOL_CLIENT_ID}
          NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
          NEXT_PUBLIC_COGNITO_DOMAIN=${NEXT_PUBLIC_COGNITO_DOMAIN}
          NEXT_PUBLIC_SOCIAL_AUTH_ENABLED=${NEXT_PUBLIC_SOCIAL_AUTH_ENABLED}
          NEXT_PUBLIC_AUTH_GOOGLE_ENABLED=${NEXT_PUBLIC_AUTH_GOOGLE_ENABLED}
          NEXT_PUBLIC_AUTH_FACEBOOK_ENABLED=${NEXT_PUBLIC_AUTH_FACEBOOK_ENABLED}
          NEXT_PUBLIC_AUTH_APPLE_ENABLED=${NEXT_PUBLIC_AUTH_APPLE_ENABLED}
          TASKS_S3_BUCKET=${TASKS_S3_BUCKET:-nurture-collective-tasks}
          INTAKE_S3_BUCKET=${INTAKE_S3_BUCKET:-${TASKS_S3_BUCKET:-nurture-collective-tasks}}
          COMMUNITY_MEDIA_S3_BUCKET=${COMMUNITY_MEDIA_S3_BUCKET:-${TASKS_S3_BUCKET:-nurture-collective-tasks}}
          COMMUNITY_API_URL=${COMMUNITY_API_URL}
          COMMUNITY_DEMO_FALLBACK=${COMMUNITY_DEMO_FALLBACK}
          COMMUNITY_ENV_SCOPE=${COMMUNITY_ENV_SCOPE:-production}
          NEXT_PUBLIC_COMMUNITY_ENV_SCOPE=${COMMUNITY_ENV_SCOPE:-production}
          AWS_REGION=${NEXT_PUBLIC_AWS_REGION:-us-east-1}
          TASKS_S3_KEY=${TASKS_S3_KEY}
          MANAGEMENT_COGNITO_GROUP=${MANAGEMENT_COGNITO_GROUP:-admin}
          NEXT_PUBLIC_MANAGEMENT_COGNITO_GROUP=${NEXT_PUBLIC_MANAGEMENT_COGNITO_GROUP:-admin}
          NEXT_PUBLIC_INTAKE_PUBLIC=${NEXT_PUBLIC_INTAKE_PUBLIC}
          INTAKE_PUBLIC=${INTAKE_PUBLIC}
          NEXT_PUBLIC_GOOGLE_REVIEWS_VISIBILITY=${NEXT_PUBLIC_GOOGLE_REVIEWS_VISIBILITY:-admin}
          GOOGLE_REVIEWS_MODE=${GOOGLE_REVIEWS_MODE:-placeholder}
          GOOGLE_PLACE_ID=${GOOGLE_PLACE_ID}
          GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY}
          NEXT_PUBLIC_GOOGLE_REVIEWS_URL=${NEXT_PUBLIC_GOOGLE_REVIEWS_URL}
          NEXT_PUBLIC_BOOKING_PROVIDER=${NEXT_PUBLIC_BOOKING_PROVIDER:-auto}
          NEXT_PUBLIC_CALENDLY_URL=${NEXT_PUBLIC_CALENDLY_URL}
          NEXT_PUBLIC_GOOGLE_BOOKING_URL=${NEXT_PUBLIC_GOOGLE_BOOKING_URL}
          NEXT_PUBLIC_CONTACT_EMAIL=${NEXT_PUBLIC_CONTACT_EMAIL}
          NEXT_PUBLIC_WHATSAPP_NUMBER=${NEXT_PUBLIC_WHATSAPP_NUMBER}
          SERVER_AWS_ACCESS_KEY_ID=${SERVER_AWS_ACCESS_KEY_ID}
          SERVER_AWS_SECRET_ACCESS_KEY=${SERVER_AWS_SECRET_ACCESS_KEY}
          OPENAI_API_KEY=${OPENAI_API_KEY}
          OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
          NURTURE_LEADS_BUCKET=${NURTURE_LEADS_BUCKET}
          NURTURE_EVENTS_BUCKET=${NURTURE_EVENTS_BUCKET}
          SLACK_ENABLED=${SLACK_ENABLED}
          SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
          SLACK_WEBHOOK_NEW_LEADS=${SLACK_WEBHOOK_NEW_LEADS}
          SLACK_WEBHOOK_SCHEDULED_CALLS=${SLACK_WEBHOOK_SCHEDULED_CALLS}
          SLACK_WEBHOOK_OPERATIONS=${SLACK_WEBHOOK_OPERATIONS}
          SLACK_WEBHOOK_LOST_LEADS=${SLACK_WEBHOOK_LOST_LEADS}
          SLACK_CHANNEL_NEW_LEADS=${SLACK_CHANNEL_NEW_LEADS}
          SLACK_CHANNEL_SCHEDULED_CALLS=${SLACK_CHANNEL_SCHEDULED_CALLS}
          SLACK_CHANNEL_OPERATIONS=${SLACK_CHANNEL_OPERATIONS}
          SLACK_CHANNEL_LOST_LEADS=${SLACK_CHANNEL_LOST_LEADS}
          CALENDLY_WEBHOOK_SIGNING_KEY=${CALENDLY_WEBHOOK_SIGNING_KEY}
          N8N_INQUIRY_WEBHOOK_URL=${N8N_INQUIRY_WEBHOOK_URL}
          N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}
          N8N_WEBHOOK_SECRET=${N8N_WEBHOOK_SECRET}
          INTAKE_TIMEOUT=${INTAKE_TIMEOUT:-15}
          MAX_RETRIES=${MAX_RETRIES:-3}
          LEADS_BUCKET=${LEADS_BUCKET:-${NURTURE_LEADS_BUCKET}}
          N8N_TASK_SYNC_WEBHOOK_URL=${N8N_TASK_SYNC_WEBHOOK_URL}
          N8N_CALENDLY_WEBHOOK_URL=${N8N_CALENDLY_WEBHOOK_URL}
          N8N_BILLING_WEBHOOK_URL=${N8N_BILLING_WEBHOOK_URL}
          N8N_BILLING_WEBHOOK_SECRET=${N8N_BILLING_WEBHOOK_SECRET}
          BILLING_SYNC_MODE=${BILLING_SYNC_MODE:-n8n}
          BILLING_PAYMENT_PROVIDER=${BILLING_PAYMENT_PROVIDER:-stub}
          BILLING_S3_BUCKET=${BILLING_S3_BUCKET:-${NURTURE_CLIENTS_BUCKET}}
          QBO_ENVIRONMENT=${QBO_ENVIRONMENT:-sandbox}
          QBO_CLIENT_ID=${QBO_CLIENT_ID}
          QBO_CLIENT_SECRET=${QBO_CLIENT_SECRET}
          QBO_REALM_ID=${QBO_REALM_ID}
          QBO_REFRESH_TOKEN=${QBO_REFRESH_TOKEN}
          QBO_REDIRECT_URI=${QBO_REDIRECT_URI:-${NEXT_PUBLIC_APP_URL}/api/integrations/quickbooks/oauth/callback}
          QBO_WEBHOOK_VERIFIER=${QBO_WEBHOOK_VERIFIER}
          QBO_DEFAULT_ITEM_ID=${QBO_DEFAULT_ITEM_ID}
          GIFT_CARD_PAYMENT_PROVIDER=${GIFT_CARD_PAYMENT_PROVIDER:-stub}
          GIFT_CARD_ORDER_WEBHOOK_URL=${GIFT_CARD_ORDER_WEBHOOK_URL}
          GIFT_CARD_ORDER_WEBHOOK_SECRET=${GIFT_CARD_ORDER_WEBHOOK_SECRET}
          NEXT_PUBLIC_GIFT_CARD_PAYMENTS_ENABLED=${NEXT_PUBLIC_GIFT_CARD_PAYMENTS_ENABLED:-false}
          NEXT_PUBLIC_GIFT_CARD_PAYMENT_PROVIDER=${NEXT_PUBLIC_GIFT_CARD_PAYMENT_PROVIDER:-stub}
          STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
          STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
          TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
          TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
          TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
          TWILIO_SMS_WEBHOOK_URL=${TWILIO_SMS_WEBHOOK_URL}
          EOF
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
