services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: community
      POSTGRES_USER: community
      POSTGRES_PASSWORD: community
    ports:
      - "5433:5432"
    volumes:
      - community_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U community -d community"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_communities_demo &&
             daphne -b 0.0.0.0 -p 8000 community_platform.asgi:application"
    ports:
      - "8001:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - community_events_local:/app/.data/events
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A community_platform worker -l info
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - worker

volumes:
  community_pg_data:
  community_events_local:
